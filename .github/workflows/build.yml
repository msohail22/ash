name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential xorriso grub-pc-bin grub-common

    # Note: Since your Makefile uses i686-elf-gcc, you might need to install an i686 cross-compiler 
    # or use a pre-built Docker container with the toolchain on CI in the future.
    - name: Run make
      run: make clean && make
